spring:
  application:
    name: test-generator
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  servlet:
    context-path: /

# Configuración de Claude
claude:
  api:
    key: ${CLAUDE_API_KEY:your-api-key-here}
    model: claude-3-opus-20240229
    max-tokens: 4096
    timeout-seconds: 60

# Configuración de la aplicación
app:
  max-zip-size-mb: 100
  temp-dir: ${java.io.tmpdir}/test-generator
  enable-code-analysis: true
  enable-coverage-estimation: true

logging:
  level:
    root: INFO
    com.testgenerator: DEBUG

gemini:
  api:
    key: ${GEMINI_API_KEY:AIzaSyAqo8JXqfAl5FchM4q9e15kl8uebnshhnI}
    model: gemini-1.5-pro
    max-tokens: 4096
    timeout-seconds: 60